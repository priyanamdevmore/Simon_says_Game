<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <div class="game-container">
        <h1 class="game-title"> SIMON SAYS</h1>
        
        <div class="game-info">
            <div>Level: <span id="level">1</span></div>
            <div>Score: <span id="score">0</span></div>
        </div>

        <div class="game-board" id="gameBoard">
            <button class="tile tile-0" data-tile="0"></button>
            <button class="tile tile-1" data-tile="1"></button>
            <button class="tile tile-2" data-tile="2"></button>
            <button class="tile tile-3" data-tile="3"></button>
        </div>

        <div class="status" id="status">Click START to begin!</div>

        <div class="game-controls">
            <button class="btn" id="startBtn">START</button>
            <button class="btn" id="resetBtn">RESET</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
